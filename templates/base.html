<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% block title %}Flask Azure Starter{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&family=Space+Mono:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}" />
  </head>
  <body>
    <div class="background-grid" aria-hidden="true"></div>
    <header class="site-header">
      <a class="brand" href="{{ url_for('home') }}">Flask + Azure</a>
      <nav>
        <a href="{{ url_for('home') }}" class="nav-link">Home</a>
        <a href="{{ url_for('about') }}" class="nav-link">About</a>
      </nav>
    </header>

    <main class="page-shell">{% block content %}{% endblock %}</main>

    <footer class="site-footer">Built for Azure App Service | {{ year }}</footer>
  </body>
</html>
